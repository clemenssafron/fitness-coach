<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>Coach — Clemens</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Coach">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --border: #22222e;
  --accent: #e8365d;
  --accent2: #4fc3f7;
  --accent3: #52b788;
  --accent4: #f0a500;
  --purple: #9b72cf;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #444;
  --mono: 'Courier New', monospace;
  --serif: Georgia, serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--serif); }

/* ── ONBOARDING ── */
#onboarding {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px 24px; z-index: 100;
}
.ob-logo { color: var(--accent); font-size: 11px; font-family: var(--mono); letter-spacing: .25em; text-transform: uppercase; margin-bottom: 24px; }
.ob-title { font-size: 32px; font-weight: normal; text-align: center; margin-bottom: 8px; line-height: 1.2; }
.ob-sub { color: var(--text2); font-size: 13px; font-family: var(--mono); text-align: center; margin-bottom: 40px; line-height: 1.6; }
.ob-label { color: var(--text2); font-size: 11px; font-family: var(--mono); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 8px; display: block; align-self: flex-start; width: 100%; max-width: 340px; }
.ob-input { width: 100%; max-width: 340px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 16px; padding: 14px 16px; font-family: var(--serif); outline: none; margin-bottom: 16px; }
.ob-input:focus { border-color: var(--accent); }
.ob-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; max-width: 340px; margin-bottom: 16px; }
.ob-btn { width: 100%; max-width: 340px; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: 16px; font-size: 15px; font-family: var(--mono); font-weight: bold; letter-spacing: .1em; cursor: pointer; margin-top: 8px; }

/* ── MAIN LAYOUT ── */
#app { display: none; flex-direction: column; height: 100vh; }
#app.visible { display: flex; }

/* Header */
.app-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px; flex-shrink: 0;
}
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
.header-name { font-size: 18px; font-weight: normal; }
.header-week { color: var(--accent); font-size: 11px; font-family: var(--mono); letter-spacing: .15em; text-transform: uppercase; }
.header-date { color: var(--text3); font-size: 11px; font-family: var(--mono); }

/* Nav */
.app-nav {
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
}
.app-nav::-webkit-scrollbar { display: none; }
.nav-btn { background: none; border: none; color: var(--text3); padding: 11px 14px; font-size: 10px; font-family: var(--mono); letter-spacing: .15em; text-transform: uppercase; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; flex-shrink: 0; }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Scroll area */
.app-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
.card-accent { border-left: 3px solid var(--accent); }
.card-green { border-left: 3px solid var(--accent3); }
.card-blue { border-left: 3px solid var(--accent2); }
.card-purple { border-left: 3px solid var(--purple); }
.card-yellow { border-left: 3px solid var(--accent4); }
.card-label { font-size: 10px; font-family: var(--mono); letter-spacing: .2em; text-transform: uppercase; margin-bottom: 8px; }
.card-title { font-size: 20px; font-weight: normal; margin-bottom: 4px; }
.card-sub { color: var(--text2); font-size: 12px; font-family: var(--mono); }

/* Warmup */
.warmup-item { padding: 9px 0; border-bottom: 1px solid #1a1a28; }
.warmup-item:last-child { border-bottom: none; }
.warmup-name { color: var(--text); font-size: 13px; margin-bottom: 2px; }
.warmup-detail { color: #5a8a6a; font-size: 11px; font-family: var(--mono); }

/* Superset */
.ss-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 14px; margin-bottom: 10px; }
.ss-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.ss-label { color: var(--accent); font-size: 10px; font-family: var(--mono); letter-spacing: .15em; text-transform: uppercase; }
.ss-rest { color: var(--text3); font-size: 10px; font-family: var(--mono); }

/* Exercise row */
.ex-row { background: var(--bg); border-radius: 4px; padding: 11px 12px; margin-bottom: 6px; }
.ex-row:last-child { margin-bottom: 0; }
.ex-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.ex-name { color: var(--text); font-size: 13px; flex: 1; padding-right: 8px; }
.ex-sets { color: var(--accent); font-size: 12px; font-family: var(--mono); white-space: nowrap; }
.ex-load { color: var(--text3); font-size: 11px; font-family: var(--mono); margin-bottom: 8px; }
.ex-suggestion { color: var(--accent4); font-size: 11px; font-family: var(--mono); margin-bottom: 8px; }

/* Set logger */
.set-logger { display: flex; gap: 6px; flex-wrap: wrap; }
.set-entry { display: flex; align-items: center; gap: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; }
.set-entry.done { border-color: var(--accent3); background: #0f1e16; }
.set-num { color: var(--text3); font-size: 10px; font-family: var(--mono); margin-right: 2px; }
.set-input { background: none; border: none; color: var(--text); font-size: 12px; font-family: var(--mono); width: 36px; text-align: center; outline: none; }
.set-x { color: var(--text3); font-size: 10px; }
.set-check { background: none; border: none; color: var(--text3); font-size: 14px; cursor: pointer; padding: 0 2px; }
.set-entry.done .set-check { color: var(--accent3); }

/* Timer */
.timer-block { background: var(--bg); border-radius: 4px; padding: 10px 12px; margin-top: 6px; display: flex; align-items: center; gap: 10px; }
.timer-display { color: var(--accent2); font-size: 20px; font-family: var(--mono); font-weight: bold; min-width: 60px; }
.timer-btn { background: var(--accent2); color: var(--bg); border: none; border-radius: 4px; padding: 6px 14px; font-size: 11px; font-family: var(--mono); font-weight: bold; cursor: pointer; }
.timer-btn.stop { background: var(--accent); }
.timer-btn.reset { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.timer-target { color: var(--text3); font-size: 11px; font-family: var(--mono); }

/* Run card */
.zone-chip { background: var(--bg); border-radius: 4px; padding: 8px 10px; border: 1px solid; display: inline-block; margin: 0 6px 6px 0; }
.zone-label { font-size: 10px; font-family: var(--mono); color: var(--text3); margin-bottom: 2px; }
.zone-val { font-size: 12px; font-family: var(--mono); font-weight: bold; }

/* Rest day */
.mob-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1a1a28; }
.mob-row:last-child { border-bottom: none; }
.mob-check { background: none; border: 1px solid var(--border); border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 12px; color: transparent; flex-shrink: 0; }
.mob-check.done { background: var(--accent3); border-color: var(--accent3); color: var(--bg); }

/* Stretch */
.stretch-row { background: var(--surface2); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; }
.stretch-name { color: var(--text); font-size: 13px; margin-bottom: 4px; }
.stretch-dur { color: var(--text3); font-size: 11px; font-family: var(--mono); margin-bottom: 6px; }
.stretch-cue { color: var(--text2); font-size: 12px; line-height: 1.5; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }
.priority-star { color: var(--purple); font-size: 10px; font-family: var(--mono); }

/* Nutrition */
.macro-row { display: flex; gap: 8px; margin: 10px 0; }
.macro-item { flex: 1; }
.macro-name { color: var(--text3); font-size: 10px; font-family: var(--mono); margin-bottom: 3px; }
.macro-val { font-size: 13px; font-family: var(--mono); font-weight: bold; }
.macro-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden; }
.macro-fill { height: 100%; border-radius: 2px; }
.meal-block { background: var(--surface2); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; }
.meal-time { color: var(--accent4); font-size: 10px; font-family: var(--mono); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 4px; }
.meal-text { color: var(--text2); font-size: 13px; line-height: 1.6; }

/* HR zones */
.hr-zone { background: var(--surface2); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; border-left: 3px solid; }
.hr-zone-name { font-size: 10px; font-family: var(--mono); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 6px; }
.hr-zone-bpm { font-size: 18px; font-family: var(--mono); font-weight: bold; margin-bottom: 2px; }
.hr-zone-use { color: var(--text2); font-size: 12px; }

/* Progress tab */
.prog-week { background: var(--surface2); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
.prog-week-num { color: var(--accent); font-size: 11px; font-family: var(--mono); min-width: 48px; }
.prog-bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }
.prog-pct { color: var(--text3); font-size: 11px; font-family: var(--mono); min-width: 32px; text-align: right; }

/* Coach note */
.coach-note { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px; }
.coach-note-label { color: var(--accent4); font-size: 10px; font-family: var(--mono); letter-spacing: .15em; }
.coach-note-text { color: var(--text2); font-size: 12px; font-style: italic; margin-top: 4px; line-height: 1.6; }

/* Buttons */
.btn-primary { background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: 14px 20px; font-size: 14px; font-family: var(--mono); font-weight: bold; cursor: pointer; width: 100%; letter-spacing: .08em; }
.btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 20px; font-size: 13px; font-family: var(--mono); cursor: pointer; width: 100%; }

/* Day selector */
.day-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.day-pill { background: var(--surface2); border: 1px solid var(--border); color: var(--text3); padding: 6px 12px; border-radius: 20px; font-size: 11px; font-family: var(--mono); cursor: pointer; }
.day-pill.today { background: #1a0d14; border-color: var(--accent); color: var(--text); }
.day-pill.done { border-color: var(--accent3); color: var(--accent3); }

/* Tabs hidden */
.tab { display: none; }
.tab.active { display: block; }

/* Misc */
.divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.pill { display: inline-block; font-size: 9px; font-family: var(--mono); padding: 3px 8px; border-radius: 2px; font-weight: bold; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
.info-box { background: var(--surface2); border-radius: 5px; padding: 11px 14px; margin-bottom: 10px; color: var(--text2); font-size: 12px; font-family: var(--mono); line-height: 1.6; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     ONBOARDING
══════════════════════════════════════ -->
<div id="onboarding">
  <p class="ob-logo">Dein persönlicher Coach</p>
  <h1 class="ob-title">Willkommen,<br>Athlet</h1>
  <p class="ob-sub">Einmalige Einrichtung — dauert 30 Sekunden</p>

  <label class="ob-label">Dein Name</label>
  <input class="ob-input" id="ob-name" type="text" placeholder="Clemens">

  <label class="ob-label">Alter · Größe (cm) · Gewicht (kg)</label>
  <div class="ob-row">
    <input class="ob-input" id="ob-age" type="number" placeholder="37" style="margin:0">
    <input class="ob-input" id="ob-height" type="number" placeholder="196" style="margin:0">
    <input class="ob-input" id="ob-weight" type="number" placeholder="115" style="margin:0">
  </div>

  <label class="ob-label" style="margin-top:10px">Startdatum (Woche 1, Tag 1)</label>
  <input class="ob-input" id="ob-start" type="date">

  <button class="ob-btn" onclick="startApp()">Training starten →</button>
</div>

<!-- ══════════════════════════════════════
     MAIN APP
══════════════════════════════════════ -->
<div id="app">

  <div class="app-header">
    <div class="header-top">
      <span class="header-name" id="hdr-name">Coach</span>
      <span class="header-week" id="hdr-week">Woche 1</span>
    </div>
    <span class="header-date" id="hdr-date"></span>
  </div>

  <div class="app-nav">
    <button class="nav-btn active" onclick="showTab('heute')">Heute</button>
    <button class="nav-btn" onclick="showTab('plan')">Plan</button>
    <button class="nav-btn" onclick="showTab('stretching')">Stretching</button>
    <button class="nav-btn" onclick="showTab('ernaehrung')">Ernährung</button>
    <button class="nav-btn" onclick="showTab('herzfreq')">HF Zonen</button>
    <button class="nav-btn" onclick="showTab('fortschritt')">Fortschritt</button>
  </div>

  <div class="app-body">

    <!-- ── HEUTE ── -->
    <div class="tab active" id="tab-heute"></div>

    <!-- ── PLAN ── -->
    <div class="tab" id="tab-plan">
      <div class="card card-accent" style="margin-bottom:16px">
        <p class="card-label" style="color:var(--accent)">12-Wochen Übersicht</p>
        <p style="color:var(--text2);font-size:13px;line-height:1.7">Tippe auf einen Tag um das Workout zu sehen. Grün = abgeschlossen.</p>
      </div>
      <div id="plan-weeks"></div>
    </div>

    <!-- ── STRETCHING ── -->
    <div class="tab" id="tab-stretching">
      <div class="card card-purple" style="margin-bottom:16px">
        <p class="card-label" style="color:var(--purple)">Abend-Routine</p>
        <p class="card-title">Tägliches Stretching</p>
        <p class="card-sub">10 Min · jeden Abend · vor dem Schlafen</p>
      </div>
      <div id="stretching-content"></div>
    </div>

    <!-- ── ERNÄHRUNG ── -->
    <div class="tab" id="tab-ernaehrung">
      <div id="ernaehrung-content"></div>
    </div>

    <!-- ── HF ZONEN ── -->
    <div class="tab" id="tab-herzfreq">
      <div id="herzfreq-content"></div>
    </div>

    <!-- ── FORTSCHRITT ── -->
    <div class="tab" id="tab-fortschritt">
      <div id="fortschritt-content"></div>
    </div>

  </div>
</div>

<script>

// DATE HELPERS
// ══════════════════════════════════════
function getCurrentWeekDay() {
  var start = new Date(PROFILE.startDate);
  var now = new Date();
  start.setHours(0,0,0,0); now.setHours(0,0,0,0);
  var diff = Math.floor((now - start) / 86400000);
  if (diff < 0) diff = 0;
  var week = Math.floor(diff / 7) + 1;
  var dayIndex = diff % 7;
  if (week > 12) { week = 12; dayIndex = 6; }
  return { week: week, dayIndex: dayIndex, totalDay: diff };
}

function getDateForDay(totalDay) {
  var start = new Date(PROFILE.startDate);
  start.setDate(start.getDate() + totalDay);
  return start;
}

function formatDate(d) {
  return d.toLocaleDateString('de-AT', { weekday: 'long', day: 'numeric', month: 'long' });
}

function dateKey(d) {
  return d.toISOString().split('T')[0];
}

function renderHeute(dayOffset) {
  var info = getCurrentWeekDay();

  var dayIndex = totalDay % 7;
  var type = WEEK_SCHEDULE[dayIndex];
  var date = getDateForDay(totalDay);
  var dkey = dateKey(date);

  var html = '';

  // Day header
  var typeColors = {
    'kraft-a': 'var(--accent)', 'kraft-b': 'var(--accent)', 'kraft-c': 'var(--accent)',
    'lauf-leicht': 'var(--accent2)', 'lauf-intervall': 'var(--accent2)', 'lauf-lang': 'var(--accent2)',
    'erholung': 'var(--accent3)'
  };
  var typeLabels = {
    'kraft-a': 'Kraft A — Oberkörper', 'kraft-b': 'Kraft B — Unterkörper + Ziehen', 'kraft-c': 'Kraft C — Ganzkörper',
    'lauf-leicht': 'Leichter Lauf', 'lauf-intervall': 'Intervall Lauf', 'lauf-lang': 'Langer Lauf',
    'erholung': 'Aktive Erholung'
  };
  var durLabels = {
    'kraft-a': '35–40 Min', 'kraft-b': '35–40 Min', 'kraft-c': '35–40 Min',
    'lauf-leicht': '30–35 Min', 'lauf-intervall': '30–40 Min', 'lauf-lang': '60–100 Min',
    'erholung': '20–30 Min'
  };

  var color = typeColors[type];

  html += '<div class="card" style="border-left:3px solid '+color+';margin-bottom:12px">';
  html += '<p style="color:var(--text3);font-size:10px;font-family:var(--mono);letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px">' + formatDate(date) + '</p>';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
  html += '<h2 style="font-size:22px;font-weight:normal">' + typeLabels[type] + '</h2>';
  html += '<div style="display:flex;gap:8px;align-items:center">';
  html += '<span style="background:'+color+';color:var(--bg);font-size:10px;font-family:var(--mono);padding:3px 9px;border-radius:2px;font-weight:bold">Woche '+week+'</span>';
  html += '<span style="color:var(--text3);font-size:11px;font-family:var(--mono)">'+durLabels[type]+'</span>';
  html += '</div></div></div>';

  // Day nav pills
  html += '<div class="day-pills">';
  var dayNames = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  var weekStart = Math.floor(totalDay / 7) * 7;
  for (var i = 0; i < 7; i++) {
    var d = weekStart + i;
    var dk = dateKey(getDateForDay(d));
    var isDone = LOG[dk] && LOG[dk]._done;
    var isToday = d === totalDay;
    var cls = isToday ? 'day-pill today' : (isDone ? 'day-pill done' : 'day-pill');
    html += '<button class="'+cls+'" onclick="renderHeute('+d+');renderHeuteNav('+d+')">' + dayNames[i] + '</button>';
  }
  html += '</div>';

  // Content based on type
  if (type === 'erholung') {
    html += renderErholungContent(dkey);
  } else if (type.startsWith('lauf')) {
    html += renderLaufContent(type, dkey);
  } else {
    html += renderKraftContent(type, week, dkey);
  }

  // Done button
  var isDone = LOG[dkey] && LOG[dkey]._done;
  html += '<div style="margin-top:16px">';
  if (isDone) {
    html += '<div style="background:#0f1e16;border:1px solid var(--accent3);border-radius:6px;padding:14px;text-align:center;color:var(--accent3);font-family:var(--mono);font-size:13px">✓ Workout abgeschlossen</div>';
  } else {
    html += '<button class="btn-primary" onclick="markDone(\''+dkey+'\')">Workout abschließen ✓</button>';
  }
  html += '</div>';

  document.getElementById('tab-heute').innerHTML = html;
}

function markDone(dkey) {
  if (!LOG[dkey]) LOG[dkey] = {};

      var lastWeight = getLastWeight(ex.id);

        }
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  });

  return html;

      var colors = {'kraft-a':'var(--accent)','kraft-b':'var(--accent)','kraft-c':'var(--accent)','lauf-leicht':'var(--accent2)','lauf-intervall':'var(--accent2)','lauf-lang':'var(--accent2)','erholung':'var(--accent3)'};
      var c = done ? 'var(--accent3)' : colors[type];
      html += '<button onclick="showTab(\'heute\');renderHeute('+totalDay+')" style="background:var(--surface2);border:1px solid '+(done?'var(--accent3)':'var(--border)')+';border-radius:4px;padding:6px 10px;cursor:pointer;text-align:center">';

}

    {name:'Aerob', pct:'80–85%', bpm: Math.round(maxHR*.80)+'–'+Math.round(maxHR*.85), color:'var(--accent4)', use:'Sonntag Lauf zweite Hälfte'},

// ══════════════════════════════════════
// RENDER: FORTSCHRITT
// ══════════════════════════════════════
function renderFortschritt() {
  var info = getCurrentWeekDay();
  var totalDone = 0;
  for (var d = 0; d < info.totalDay + 1; d++) {
    var dk = dateKey(getDateForDay(d));
    if (LOG[dk] && LOG[dk]._done) totalDone++;
  }
  var totalDays = info.totalDay + 1;
  var pct = totalDays > 0 ? Math.round(totalDone / Math.min(totalDays, 84) * 100) : 0;

  var html = '<div class="card card-accent" style="margin-bottom:14px">';
  html += '<p class="card-label" style="color:var(--accent)">Gesamtfortschritt</p>';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  html += '<span style="color:var(--text);font-size:28px;font-family:var(--mono);font-weight:bold">'+pct+'%</span>';
  html += '<span style="color:var(--text3);font-size:12px;font-family:var(--mono)">'+totalDone+' / 84 Tage</span>';
  html += '</div>';
  html += '<div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">';
  html += '<div style="height:100%;width:'+pct+'%;background:var(--accent);border-radius:3px;transition:width .3s"></div>';
  html += '</div></div>';

  // Phase info
  var phases = [
    {name:'Phase 1 — Fundament', weeks:'Wo 1–4', focus:'Gewohnheit aufbauen. Form beim RDL und Klimmzug. Leichte Läufe verlangsamen.'},
    {name:'Phase 2 — Aufbau', weeks:'Wo 5–8', focus:'Gewicht erhöhen. Langen Lauf auf 12k ausdehnen. Tempo-Intervalle beginnen.'},
    {name:'Phase 3 — Akkumulieren', weeks:'Wo 9–12', focus:'Zeit auf den Beinen. Ultra-Ermüdung simulieren. Langer Lauf auf 16k.'},
  ];
  var currentPhase = Math.min(Math.floor((info.week - 1) / 4), 2);
  phases.forEach(function(p, i) {
    var isActive = i === currentPhase;
    html += '<div class="card" style="margin-bottom:8px;border-left:3px solid '+(isActive?'var(--accent)':'var(--border)')+'">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
    html += '<p style="color:'+(isActive?'var(--accent)':'var(--text3)')+';font-size:10px;font-family:var(--mono);letter-spacing:.15em;text-transform:uppercase">'+p.name+'</p>';
    html += '<span style="color:var(--text3);font-size:10px;font-family:var(--mono)">'+p.weeks+'</span>';
    html += '</div>';
    html += '<p style="color:var(--text2);font-size:12px;line-height:1.5">'+p.focus+'</p>';
    html += '</div>';
  });

  // Weekly done bars
  html += '<p style="color:var(--text3);font-size:10px;font-family:var(--mono);letter-spacing:.2em;text-transform:uppercase;margin:16px 0 10px">Wochenübersicht</p>';
  for (var w = 1; w <= 12; w++) {
    var weekDone = 0;
    for (var d = 0; d < 7; d++) {
      var td = (w-1)*7+d;
      var dk = dateKey(getDateForDay(td));
      if (LOG[dk] && LOG[dk]._done) weekDone++;
    }
    var wpct = Math.round(weekDone/7*100);
    var isPast = w < info.week;
    var isCurrent = w === info.week;
    html += '<div class="prog-week">';
    html += '<span class="prog-week-num" style="color:'+(isCurrent?'var(--accent)':'var(--text3)')+'">Wo '+w+'</span>';
    html += '<div class="prog-bar-bg"><div class="prog-bar-fill" style="width:'+wpct+'%;background:'+(isCurrent?'var(--accent)':'var(--accent3)')+'"></div></div>';
    html += '<span class="prog-pct">'+weekDone+'/7</span>';
    html += '</div>';
  }

  document.getElementById('fortschritt-content').innerHTML = html;
}

// ══════════════════════════════════════
// TIMER
// ══════════════════════════════════════
function startTimer(exId, dkey, seconds) {
  var key = exId + '-' + dkey;
  if (TIMERS[key]) { clearInterval(TIMERS[key].interval); }

  var remaining = seconds;
  var displayEl = document.getElementById('timer-' + exId + '-' + dkey);
  var wrapEl = document.getElementById('timer-wrap-' + exId + '-' + dkey);

  if (!displayEl) return;

  // Change button to stop
  var btn = wrapEl.querySelector('.timer-btn:not(.reset)');
  if (btn) { btn.textContent = 'Stop'; btn.classList.add('stop'); btn.onclick = function() { stopTimer(exId, dkey, seconds); }; }

  TIMERS[key] = {
    interval: setInterval(function() {
      remaining--;
      if (displayEl) displayEl.textContent = remaining;
      if (remaining <= 0) {
        clearInterval(TIMERS[key].interval);
        if (displayEl) displayEl.textContent = '✓';
        if (displayEl) displayEl.style.color = 'var(--accent3)';
        // Vibrate if supported
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      }
    }, 1000),
    seconds: seconds
  };
}

function stopTimer(exId, dkey, seconds) {
  var key = exId + '-' + dkey;
  if (TIMERS[key]) { clearInterval(TIMERS[key].interval); delete TIMERS[key]; }
  var wrapEl = document.getElementById('timer-wrap-' + exId + '-' + dkey);
  if (!wrapEl) return;
  var btn = wrapEl.querySelector('.timer-btn.stop');
  if (btn) { btn.textContent = 'Start'; btn.classList.remove('stop'); btn.onclick = function() { startTimer(exId, dkey, seconds); }; }
}

function resetTimer(exId, dkey, seconds) {
  stopTimer(exId, dkey, seconds);
  var displayEl = document.getElementById('timer-' + exId + '-' + dkey);
  if (displayEl) { displayEl.textContent = seconds; displayEl.style.color = 'var(--accent2)'; }
}

// ══════════════════════════════════════
// SET LOGGING
// ══════════════════════════════════════
function saveSet(exId, dkey, setIdx, kg, reps) {
  if (!LOG[dkey]) LOG[dkey] = {};
  if (!LOG[dkey][exId]) LOG[dkey][exId] = [];
  if (!LOG[dkey][exId][setIdx]) LOG[dkey][exId][setIdx] = {kg:'', reps:'', done:false};
  if (kg !== null) LOG[dkey][exId][setIdx].kg = kg;
  if (reps !== null) LOG[dkey][exId][setIdx].reps = reps;
  save('log', LOG);
}

function toggleSetDone(exId, dkey, setIdx) {
  if (!LOG[dkey]) LOG[dkey] = {};
  if (!LOG[dkey][exId]) LOG[dkey][exId] = [];
  if (!LOG[dkey][exId][setIdx]) LOG[dkey][exId][setIdx] = {kg:'', reps:'', done:false};
  LOG[dkey][exId][setIdx].done = !LOG[dkey][exId][setIdx].done;
  save('log', LOG);
  var el = document.getElementById('set-' + exId + '-' + dkey + '-' + setIdx);
  if (el) {
    el.classList.toggle('done');
    var btn = el.querySelector('.set-check');
    if (btn) btn.textContent = LOG[dkey][exId][setIdx].done ? '✓' : '○';
  }
}

function toggleMob(dkey, itemId) {
  if (!LOG[dkey]) LOG[dkey] = {};
  if (!LOG[dkey]._mob) LOG[dkey]._mob = {};
  LOG[dkey]._mob[itemId] = !LOG[dkey]._mob[itemId];
  save('log', LOG);
  var info = getCurrentWeekDay();
  renderHeute(info.totalDay);
}

function getLastWeight(exId) {
  var keys = Object.keys(LOG).sort();
  for (var i = keys.length - 1; i >= 0; i--) {
    var entry = LOG[keys[i]];
    if (entry && entry[exId] && entry[exId].length > 0) {
      for (var s = 0; s < entry[exId].length; s++) {
        if (entry[exId][s] && entry[exId][s].kg) return parseFloat(entry[exId][s].kg);
      }
    }
  }
  return null;
}

function lastSetsAllDone(exId) {
  var keys = Object.keys(LOG).sort();
  for (var i = keys.length - 1; i >= 0; i--) {
    var entry = LOG[keys[i]];
    if (entry && entry[exId] && entry[exId].length > 0) {
      return entry[exId].every(function(s) { return s && s.done; });
    }
  }
  return false;
}

// ══════════════════════════════════════
// TAB NAVIGATION
// ══════════════════════════════════════
function showTab(id) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  var tab = document.getElementById('tab-' + id);
  if (tab) tab.classList.add('active');
  var navMap = {heute:0, plan:1, stretching:2, ernaehrung:3, herzfreq:4, fortschritt:5};
  var btns = document.querySelectorAll('.nav-btn');
  if (navMap[id] !== undefined && btns[navMap[id]]) btns[navMap[id]].classList.add('active');
}


// ══════════════════════════════════════
// STRETCH TIMERS
// ══════════════════════════════════════
var STRETCH_TIMERS = {};

function startStretchTimer(idx, seconds) {
  if (STRETCH_TIMERS[idx]) { clearInterval(STRETCH_TIMERS[idx]); }
  var remaining = seconds;
  var el = document.getElementById('stimer-' + idx);
  if (!el) return;
  el.style.color = 'var(--accent2)';

  STRETCH_TIMERS[idx] = setInterval(function() {
    remaining--;
    var el2 = document.getElementById('stimer-' + idx);
    if (el2) el2.textContent = remaining;
    if (remaining <= 0) {
      clearInterval(STRETCH_TIMERS[idx]);
      var el3 = document.getElementById('stimer-' + idx);
      if (el3) { el3.textContent = '✓'; el3.style.color = 'var(--accent3)'; }
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.35].forEach(function(t) {
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 660;
          gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.3);
          osc.start(ctx.currentTime + t);
          osc.stop(ctx.currentTime + t + 0.3);
        });
      } catch(e) {}
    }
  }, 1000);
}

function resetStretchTimer(idx, seconds) {
  if (STRETCH_TIMERS[idx]) { clearInterval(STRETCH_TIMERS[idx]); delete STRETCH_TIMERS[idx]; }
  var el = document.getElementById('stimer-' + idx);
  if (el) { el.textContent = seconds; el.style.color = 'var(--accent2)'; }
}

// ══════════════════════════════════════
// STORAGE
// ══════════════════════════════════════
function save(key, val) {
  try { localStorage.setItem('coach_' + key, JSON.stringify(val)); } catch(e) {}
}
function load(key) {
  try { var v = localStorage.getItem('coach_' + key); return v ? JSON.parse(v) : null; } catch(e) { return null; }
}
