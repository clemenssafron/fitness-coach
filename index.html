<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06080f">
<title>Coach — Clemens</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #06080f;
  --surface: #0d0f1a;
  --surface2: #131520;
  --border: #1e2030;
  --accent: #e8365d;
  --accent2: #4fc3f7;
  --accent3: #52b788;
  --accent4: #f0a500;
  --purple: #9b72cf;
  --text: #f0f0f0;
  --text2: #b0b0c0;
  --text3: #7070a0;
  --text4: #4a4a70;
  --mono: 'Courier New', monospace;
  --serif: Georgia, serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--serif); }

/* ── ONBOARDING ── */
#onboarding {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px 24px; z-index: 100; overflow-y: auto;
}
.ob-logo { color: var(--accent); font-size: 11px; font-family: var(--mono); letter-spacing: .25em; text-transform: uppercase; margin-bottom: 20px; }
.ob-title { font-size: 30px; font-weight: normal; text-align: center; margin-bottom: 6px; line-height: 1.2; }
.ob-sub { color: var(--text3); font-size: 13px; font-family: var(--mono); text-align: center; margin-bottom: 32px; line-height: 1.6; }
.ob-label { color: var(--text3); font-size: 11px; font-family: var(--mono); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 6px; display: block; width: 100%; max-width: 340px; }
.ob-input { width: 100%; max-width: 340px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 16px; padding: 13px 16px; font-family: var(--serif); outline: none; margin-bottom: 14px; }
.ob-input:focus { border-color: var(--accent); }
.ob-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; max-width: 340px; margin-bottom: 14px; }
.ob-btn { width: 100%; max-width: 340px; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: 15px; font-size: 15px; font-family: var(--mono); font-weight: bold; letter-spacing: .1em; cursor: pointer; margin-top: 8px; }

/* ── APP LAYOUT ── */
#app { display: none; flex-direction: column; height: 100vh; }
#app.visible { display: flex; }

.app-header { background: var(--surface); border-bottom: 2px solid var(--accent); padding: 13px 16px 11px; flex-shrink: 0; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
.header-name { font-size: 19px; font-weight: normal; color: var(--text); }
.header-week { color: var(--accent); font-size: 11px; font-family: var(--mono); letter-spacing: .15em; text-transform: uppercase; }
.header-date { color: var(--text3); font-size: 11px; font-family: var(--mono); }

.app-nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
.app-nav::-webkit-scrollbar { display: none; }
.nav-btn { background: none; border: none; color: var(--text4); padding: 11px 14px; font-size: 10px; font-family: var(--mono); letter-spacing: .15em; text-transform: uppercase; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; flex-shrink: 0; transition: color .15s; }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

.app-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px; }

/* ── CARDS ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 10px; }
.card-label { font-size: 10px; font-family: var(--mono); letter-spacing: .2em; text-transform: uppercase; margin-bottom: 6px; }

/* ── WARMUP ── */
.warmup-block { background: #0a1810; border: 1px solid #1a3828; border-left: 3px solid var(--accent3); border-radius: 6px; padding: 13px 15px; margin-bottom: 10px; }
.warmup-item { padding: 8px 0; border-bottom: 1px solid #142010; }
.warmup-item:last-child { border-bottom: none; }
.warmup-name { color: var(--text); font-size: 13px; margin-bottom: 2px; }
.warmup-detail { color: #6aaa7a; font-size: 11px; font-family: var(--mono); }

/* ── SUPERSET ── */
.ss-block { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 6px; padding: 13px; margin-bottom: 10px; }
.ss-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 8px; }
.ss-label { color: var(--accent); font-size: 10px; font-family: var(--mono); letter-spacing: .12em; text-transform: uppercase; flex: 1; line-height: 1.4; }
.ss-rest { color: var(--text4); font-size: 10px; font-family: var(--mono); white-space: nowrap; }

/* ── PAUSE TIMER (auto) ── */
.pause-timer { background: #1a0d14; border: 1px solid var(--accent); border-radius: 6px; padding: 10px 14px; margin-bottom: 8px; display: none; align-items: center; gap: 12px; }
.pause-timer.active { display: flex; }
.pause-label { color: var(--text3); font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .12em; }
.pause-display { color: var(--accent); font-size: 22px; font-family: var(--mono); font-weight: bold; }
.pause-skip { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--text3); font-size: 10px; font-family: var(--mono); padding: 4px 10px; cursor: pointer; margin-left: auto; }

/* ── EXERCISE ROW (Option B style) ── */
.ex-block { background: var(--bg); border-radius: 5px; padding: 11px 12px; margin-bottom: 6px; border: 1px solid var(--border); }
.ex-block:last-child { margin-bottom: 0; }
.ex-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.ex-name { color: var(--text); font-size: 13px; flex: 1; padding-right: 8px; line-height: 1.4; }
.ex-sets-badge { color: var(--accent); font-size: 12px; font-family: var(--mono); white-space: nowrap; }
.ex-load { color: var(--text3); font-size: 11px; font-family: var(--mono); margin-bottom: 6px; }
.ex-suggestion { color: var(--accent4); font-size: 11px; font-family: var(--mono); margin-bottom: 8px; }

/* ── WEIGHT INPUT (once per exercise) ── */
.weight-row { display: flex; align-items: center; gap: 8px; background: #1a0d14; border: 1px solid #3a1525; border-radius: 4px; padding: 7px 10px; margin-bottom: 8px; }
.weight-label { color: var(--accent); font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .1em; white-space: nowrap; }
.weight-input { background: none; border: none; color: var(--text); font-size: 16px; font-family: var(--mono); font-weight: bold; width: 55px; outline: none; }
.weight-unit { color: var(--text3); font-size: 11px; font-family: var(--mono); }
.weight-note { color: var(--text4); font-size: 10px; font-family: var(--mono); margin-left: 4px; }

/* ── SET BUTTONS ── */
.sets-row { display: flex; gap: 6px; flex-wrap: wrap; }
.set-btn { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 5px; padding: 7px 4px 5px; text-align: center; min-width: 54px; cursor: pointer; transition: all .15s; }
.set-btn-num { color: var(--text4); font-size: 9px; font-family: var(--mono); margin-bottom: 3px; }
.set-btn-input { background: none; border: none; color: var(--text); font-size: 15px; font-family: var(--mono); font-weight: bold; width: 100%; text-align: center; outline: none; cursor: text; }
.set-btn.done { background: #0d1e10; border-color: var(--accent3); }
.set-btn.done .set-btn-input { color: var(--accent3); }
.set-btn.done .set-btn-num { color: var(--accent3); }

/* ── TIMED EXERCISE ── */
.timer-block { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 9px 12px; margin-top: 6px; display: flex; align-items: center; gap: 10px; }
.timer-display { color: var(--accent2); font-size: 22px; font-family: var(--mono); font-weight: bold; min-width: 52px; }
.timer-btn { background: var(--accent2); color: var(--bg); border: none; border-radius: 4px; padding: 6px 14px; font-size: 11px; font-family: var(--mono); font-weight: bold; cursor: pointer; }
.timer-btn.stop { background: var(--accent); }
.timer-btn.reset-btn { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

/* ── RUN ── */
.zone-chip { background: var(--surface2); border-radius: 4px; padding: 8px 10px; border: 1px solid; display: inline-block; margin: 0 6px 6px 0; }
.zone-lbl { font-size: 10px; font-family: var(--mono); color: var(--text3); margin-bottom: 2px; }
.zone-val { font-size: 12px; font-family: var(--mono); font-weight: bold; }

/* ── REST DAY ── */
.mob-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.mob-row:last-child { border-bottom: none; }
.mob-check { background: none; border: 1.5px solid var(--border); border-radius: 50%; width: 26px; height: 26px; cursor: pointer; font-size: 13px; color: transparent; flex-shrink: 0; }
.mob-check.done { background: var(--accent3); border-color: var(--accent3); color: var(--bg); }

/* ── STRETCH ── */
.stretch-row { background: var(--surface2); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; }
.stretch-timer-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
.stretch-timer-disp { color: var(--accent2); font-size: 18px; font-family: var(--mono); font-weight: bold; min-width: 42px; }
.stretch-cue { color: var(--text2); font-size: 12px; line-height: 1.55; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }

/* ── NUTRITION ── */
.macro-item { flex: 1; }
.macro-name { color: var(--text3); font-size: 10px; font-family: var(--mono); margin-bottom: 3px; }
.macro-val { font-size: 13px; font-family: var(--mono); font-weight: bold; }
.macro-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden; }
.macro-fill { height: 100%; border-radius: 2px; }
.meal-block { background: var(--surface2); border-radius: 6px; padding: 11px 13px; margin-bottom: 8px; }
.meal-time { color: var(--accent4); font-size: 10px; font-family: var(--mono); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 6px; }

/* ── HR ZONES ── */
.hr-zone { background: var(--surface2); border-radius: 6px; padding: 11px 13px; margin-bottom: 8px; border-left: 3px solid; }

/* ── PROGRESS ── */
.prog-week { background: var(--surface2); border-radius: 5px; padding: 10px 13px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; }
.prog-bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-bar-fill { height: 100%; border-radius: 2px; transition: width .3s; }

/* ── DAY PILLS ── */
.day-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.day-pill { background: var(--surface2); border: 1px solid var(--border); color: var(--text4); padding: 6px 12px; border-radius: 20px; font-size: 11px; font-family: var(--mono); cursor: pointer; }
.day-pill.today { background: #1a0d14; border-color: var(--accent); color: var(--text); }
.day-pill.done { border-color: var(--accent3); color: var(--accent3); }

/* ── MISC ── */
.tab { display: none; }
.tab.active { display: block; }
.info-box { background: var(--surface2); border-radius: 5px; padding: 10px 13px; margin-bottom: 10px; color: var(--text2); font-size: 12px; font-family: var(--mono); line-height: 1.6; }
.coach-note { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px; }
.coach-note-text { color: var(--text2); font-size: 12px; font-style: italic; margin-top: 4px; line-height: 1.6; }
.btn-primary { background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: 14px 20px; font-size: 14px; font-family: var(--mono); font-weight: bold; cursor: pointer; width: 100%; letter-spacing: .08em; }
</style>
</head>
<body>

<!-- ONBOARDING -->
<div id="onboarding">
  <p class="ob-logo">Dein persönlicher Coach</p>
  <h1 class="ob-title">Willkommen,<br>Athlet</h1>
  <p class="ob-sub">Einmalige Einrichtung — 30 Sekunden</p>
  <label class="ob-label">Dein Name</label>
  <input class="ob-input" id="ob-name" type="text" placeholder="Clemens">
  <label class="ob-label">Alter · Größe (cm) · Gewicht (kg)</label>
  <div class="ob-row">
    <input class="ob-input" id="ob-age" type="number" placeholder="37" style="margin:0">
    <input class="ob-input" id="ob-height" type="number" placeholder="196" style="margin:0">
    <input class="ob-input" id="ob-weight" type="number" placeholder="115" style="margin:0">
  </div>
  <label class="ob-label" style="margin-top:10px">Startdatum (Woche 1, Tag 1)</label>
  <input class="ob-input" id="ob-start" type="date">
  <button class="ob-btn" onclick="startApp()">Training starten →</button>
</div>

<!-- APP -->
<div id="app">
  <div class="app-header">
    <div class="header-top">
      <span class="header-name" id="hdr-name">Coach</span>
      <span class="header-week" id="hdr-week">Woche 1</span>
    </div>
    <span class="header-date" id="hdr-date"></span>
  </div>
  <div class="app-nav">
    <button class="nav-btn active" onclick="showTab('heute')">Heute</button>
    <button class="nav-btn" onclick="showTab('plan')">Plan</button>
    <button class="nav-btn" onclick="showTab('stretching')">Stretching</button>
    <button class="nav-btn" onclick="showTab('ernaehrung')">Ernährung</button>
    <button class="nav-btn" onclick="showTab('herzfreq')">HF Zonen</button>
    <button class="nav-btn" onclick="showTab('fortschritt')">Fortschritt</button>
  </div>
  <div class="app-body">
    <div class="tab active" id="tab-heute"></div>
    <div class="tab" id="tab-plan">
      <div class="card" style="border-left:3px solid var(--accent);margin-bottom:14px">
        <p class="card-label" style="color:var(--accent)">12-Wochen Übersicht</p>
        <p style="color:var(--text2);font-size:13px;line-height:1.6">Tippe auf einen Tag um das Workout zu sehen. Grün = abgeschlossen.</p>
      </div>
      <div id="plan-weeks"></div>
    </div>
    <div class="tab" id="tab-stretching">
      <div class="card" style="border-left:3px solid var(--purple);margin-bottom:14px">
        <p class="card-label" style="color:var(--purple)">Abend-Routine</p>
        <p style="font-size:20px;font-weight:normal;margin-bottom:4px">Tägliches Stretching</p>
        <p style="color:var(--text3);font-size:12px;font-family:var(--mono)">10 Min · jeden Abend · vor dem Schlafen</p>
      </div>
      <div id="stretching-content"></div>
    </div>
    <div class="tab" id="tab-ernaehrung"><div id="ernaehrung-content"></div></div>
    <div class="tab" id="tab-herzfreq"><div id="herzfreq-content"></div></div>
    <div class="tab" id="tab-fortschritt"><div id="fortschritt-content"></div></div>
  </div>
</div>

<script>
var PROFILE = {}, LOG = {}, TIMERS = {}, STRETCH_TIMERS = {}, PAUSE_TIMERS = {};

var WEEK_SCHEDULE = ['kraft-a','lauf-leicht','kraft-b','lauf-intervall','kraft-c','erholung','lauf-lang'];

var PUSH_UP_ROTATION = ['Standard','Breit','Diamant','Abfallend'];

// ── CORE PROGRESSIONS ──
function getCoreFinisher(type, week) {
  if (type === 'kraft-a') {
    if (week <= 4) return [
      {id:'db-crunch', name:'DB Crunch (DB auf der Brust)', sets:3, reps:'15', weighted:true, timed:false},
      {id:'plank-tap', name:'Plank mit Schultertap', sets:3, reps:'10 je Seite', weighted:false, timed:false},
    ];
    if (week <= 8) return [
      {id:'db-crunch', name:'DB Crunch', sets:4, reps:'15', weighted:true, timed:false},
      {id:'ab-rollout', name:'Ab Rollout (BB oder Rad)', sets:4, reps:'8', weighted:false, timed:false},
    ];
    return [
      {id:'db-crunch', name:'DB Crunch (schwerer)', sets:4, reps:'20', weighted:true, timed:false},
      {id:'ab-rollout', name:'Ab Rollout', sets:4, reps:'12', weighted:false, timed:false},
    ];
  }
  if (type === 'kraft-b') {
    if (week <= 4) return [
      {id:'russian-twist', name:'Russian Twist (DB halten)', sets:3, reps:'20 gesamt', weighted:true, timed:false},
      {id:'side-plank', name:'Side Plank', sets:3, reps:'30 Sek je Seite', weighted:false, timed:true, seconds:30},
    ];
    if (week <= 8) return [
      {id:'russian-twist', name:'Russian Twist (schwerer DB)', sets:3, reps:'20 gesamt', weighted:true, timed:false},
      {id:'side-plank-hip', name:'Side Plank mit Hüftheben', sets:3, reps:'10 je Seite', weighted:false, timed:false},
    ];
    return [
      {id:'russian-twist', name:'Russian Twist (schwerer DB)', sets:4, reps:'20 gesamt', weighted:true, timed:false},
      {id:'copenhagen', name:'Copenhagen Plank', sets:4, reps:'20 Sek je Seite', weighted:false, timed:true, seconds:20},
    ];
  }
  if (type === 'kraft-c') {
    if (week <= 4) return [
      {id:'dead-bug', name:'Dead Bug', sets:3, reps:'10 je Seite', weighted:false, timed:false},
      {id:'hollow', name:'Hollow Body Halten', sets:3, reps:'30 Sek', weighted:false, timed:true, seconds:30},
    ];
    if (week <= 8) return [
      {id:'leg-raise', name:'Lying Leg Raise', sets:3, reps:'12', weighted:false, timed:false},
      {id:'hollow', name:'Hollow Body Halten', sets:3, reps:'40 Sek', weighted:false, timed:true, seconds:40},
    ];
    return [
      {id:'leg-raise', name:'Hanging Leg Raise (wenn Stange vorhanden, sonst Lying)', sets:3, reps:'12', weighted:false, timed:false},
      {id:'ab-rollout2', name:'Ab Rollout', sets:3, reps:'10', weighted:false, timed:false},
    ];
  }
  return [];
}

var SUPERSETS_BASE = {
  'kraft-a': [
    {id:'ss-a1', label:'Drücken + Ziehen', rest:90,
      ex:[
        {id:'pushup', name:'Liegestütz', rotation:PUSH_UP_ROTATION, sets:4, reps:'20–25', weighted:false, timed:false},
        {id:'db-row-a', name:'DB Vorgebeugtes Rudern', sets:4, reps:'12–15', weighted:true, timed:false},
      ]},
    {id:'ss-a2', label:'DB Schulterdrücken + DB Curl', rest:75,
      ex:[
        {id:'ohp', name:'DB Schulterdrücken', sets:3, reps:'12', weighted:true, timed:false},
        {id:'db-curl', name:'DB Bizeps Curl', sets:3, reps:'12', weighted:true, timed:false},
      ]},
  ],
  'kraft-b': [
    {id:'ss-b1', label:'DB Hüftstreckung + DB Rudern', rest:90,
      ex:[
        {id:'db-rdl', name:'DB Rumänisches Kreuzheben', sets:4, reps:'12', weighted:true, timed:false},
        {id:'db-row-b', name:'DB Einarmiges Rudern', sets:4, reps:'12 je Seite', weighted:true, timed:false},
      ]},
    {id:'ss-b2', label:'DB Kniebeuge + Jumping Lunge', rest:90,
      ex:[
        {id:'goblet', name:'DB Goblet Kniebeuge', sets:4, reps:'15–20', weighted:true, timed:false},
        {id:'jumping-lunge', name:'Jumping Lunge (Körpergewicht)', sets:4, reps:'10 je Bein', weighted:false, timed:false},
      ]},
  ],
  'kraft-c': [
    {id:'ss-c1', label:'Körpergewicht + DB Hüftstreckung', rest:90,
      ex:[
        {id:'burpee', name:'Burpee (Wo 1–4 ohne Sprung, ab Wo 5 mit)', sets:4, reps:'10–12', weighted:false, timed:false},
        {id:'sl-rdl', name:'DB Einbeiniges RDL (DB je Hand)', sets:4, reps:'8 je Seite', weighted:true, timed:false},
      ]},
    {id:'ss-c2', label:'DB Thruster + DB Rudern', rest:90,
      ex:[
        {id:'thruster', name:'DB Thruster (Kniebeuge zu Schulterdrücken)', sets:3, reps:'10', weighted:true, timed:false},
        {id:'db-row-c', name:'DB Einarmiges Rudern (Untergriff-Fokus)', sets:3, reps:'12 je Seite', weighted:true, timed:false},
      ]},
  ],
};

var WARMUPS = {
  'kraft-a':{label:'Oberkörper Aktivierung',dauer:'5 Min',items:[
    {name:'Springseil — leichtes Tempo',detail:'2 Min · HF auf ~120, Schultern und Handgelenke aufwärmen'},
    {name:'Armkreisen — vor und zurück',detail:'30 Sek je Richtung'},
    {name:'Türrahmen Brustdehnung',detail:'10 Wdh · öffnet die Brust vor dem Drücken'},
    {name:'Katzenbuckel mit Rotation',detail:'5 Wdh je Seite · löst die Wirbelsäule'},
  ]},
  'kraft-b':{label:'Hüfte & Hinterkette Aktivierung',dauer:'6 Min',items:[
    {name:'Springseil — leichtes Tempo',detail:'90 Sek · Kerntemperatur erhöhen vor schwerem Heben'},
    {name:'Hüftkreisen — stehend, beide Richtungen',detail:'10 je Richtung · direkte Vorbereitung für RDL'},
    {name:'Gesäßbrücke — Körpergewicht',detail:'2×12 · Gesäß aktivieren bevor es belastet wird'},
    {name:'Beinschwingen — vor/zurück und seitwärts',detail:'10 je Richtung pro Bein'},
    {name:'Inchworm zur tiefen Kniebeuge',detail:'5 Wdh · Oberschenkel dehnen und Hüften öffnen'},
  ]},
  'kraft-c':{label:'Ganzkörper Dynamische Aktivierung',dauer:'6 Min',items:[
    {name:'Springseil — Intensität aufbauen',detail:'2 Min · leicht starten, moderate Pace. HF Ziel 130–140'},

// ══ DATE HELPERS ══
function getCurrentWeekDay() {
  var start = new Date(PROFILE.startDate); var now = new Date();
  start.setHours(0,0,0,0); now.setHours(0,0,0,0);
  var diff = Math.max(0, Math.floor((now-start)/86400000));
  var week = Math.min(Math.floor(diff/7)+1, 12);
  return {week:week, dayIndex:diff%7, totalDay:diff};
}
function getDateForDay(n) { var d = new Date(PROFILE.startDate); d.setDate(d.getDate()+n); return d; }
function formatDate(d) { return d.toLocaleDateString('de-AT',{weekday:'long',day:'numeric',month:'long'}); }
function dateKey(d) { return d.toISOString().split('T')[0]; }

// ══ SOUND ══
function beep(freq, times) {
  try {
    var ctx = new (window.AudioContext||window.webkitAudioContext)();
    for (var i=0; i<(times||3); i++) {
      (function(t){
        var osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq||880;
        gain.gain.setValueAtTime(0.4, ctx.currentTime+t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.25);
        osc.start(ctx.currentTime+t); osc.stop(ctx.currentTime+t+0.25);
      })(i*0.32);
    }
  } catch(e){}
  if (navigator.vibrate) navigator.vibrate([150,80,150]);
}

// ══ RENDER HEUTE ══
function renderHeute(dayOffset) {
  var info = getCurrentWeekDay();
  var totalDay = dayOffset !== undefined ? dayOffset : info.totalDay;
  var week = Math.floor(totalDay/7)+1;
  var type = WEEK_SCHEDULE[totalDay%7];
  var date = getDateForDay(totalDay);
  var dkey = dateKey(date);
  var colors = {'kraft-a':'var(--accent)','kraft-b':'var(--accent)','kraft-c':'var(--accent)','lauf-leicht':'var(--accent2)','lauf-intervall':'var(--accent2)','lauf-lang':'var(--accent2)','erholung':'var(--accent3)'};
  var labels = {'kraft-a':'Kraft A — Oberkörper','kraft-b':'Kraft B — Unterkörper + Ziehen','kraft-c':'Kraft C — Ganzkörper','lauf-leicht':'Leichter Lauf','lauf-intervall':'Intervall Lauf','lauf-lang':'Langer Lauf','erholung':'Aktive Erholung'};
  var durs = {'kraft-a':'35–40 Min','kraft-b':'35–40 Min','kraft-c':'35–40 Min','lauf-leicht':'30–35 Min','lauf-intervall':'30–40 Min','lauf-lang':'60–100 Min','erholung':'20–30 Min'};
  var c = colors[type];
  var html = '';
  html += '<div class="card" style="border-left:3px solid '+c+';margin-bottom:12px">';
  html += '<p style="color:var(--text4);font-size:10px;font-family:var(--mono);letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px">'+formatDate(date)+'</p>';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
  html += '<h2 style="font-size:21px;font-weight:normal">'+labels[type]+'</h2>';
  html += '<div style="display:flex;gap:8px"><span style="background:'+c+';color:var(--bg);font-size:10px;font-family:var(--mono);padding:3px 9px;border-radius:2px;font-weight:bold">Woche '+week+'</span>';
  html += '<span style="color:var(--text3);font-size:11px;font-family:var(--mono)">'+durs[type]+'</span></div></div></div>';
  // Day pills
  html += '<div class="day-pills">';
  var wStart = Math.floor(totalDay/7)*7;
  ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(function(n,i){
    var d2=wStart+i, dk2=dateKey(getDateForDay(d2));
    var isDone=LOG[dk2]&&LOG[dk2]._done, isToday=d2===totalDay;
    var cls=isToday?'day-pill today':(isDone?'day-pill done':'day-pill');
    html+='<button class="'+cls+'" onclick="renderHeute('+d2+')">'+n+'</button>';
  });
  html += '</div>';
  if (type==='erholung') html += renderErholungContent(dkey);
  else if (type.startsWith('lauf')) html += renderLaufContent(type);
  else html += renderKraftContent(type, week, dkey);
  var isDone = LOG[dkey]&&LOG[dkey]._done;
  html += '<div style="margin-top:14px">';
  if (isDone) html += '<div style="background:#0d1e10;border:1px solid var(--accent3);border-radius:6px;padding:13px;text-align:center;color:var(--accent3);font-family:var(--mono);font-size:13px">✓ Workout abgeschlossen</div>';
  else html += '<button class="btn-primary" onclick="markDone(\''+dkey+'\')">Workout abschließen ✓</button>';
  html += '</div>';
  document.getElementById('tab-heute').innerHTML = html;
}

function markDone(dkey) {
  if (!LOG[dkey]) LOG[dkey]={};
  LOG[dkey]._done=true; save('log',LOG);
  var info=getCurrentWeekDay(); renderHeute(info.totalDay); renderFortschritt();
}

      var lastW = getLastWeight(ex.id);
      var suggestion = '';
      if (ex.weighted && lastW) {
        if (lastSetsAllDone(ex.id, dkey)) suggestion = (Math.round(lastW*1.05*2)/2)+'kg <span style="color:var(--text3)">+5% — letztes Mal alles geschafft</span>';
        else suggestion = lastW+'kg <span style="color:var(--text3)">gleiches Gewicht halten</span>';
      }
      html += '<div class="ex-block">';
      html += '<div class="ex-top"><div class="ex-name">'+exName+'</div><span class="ex-sets-badge">'+ex.sets+'×'+ex.reps+'</span></div>';
      if (suggestion) html += '<div class="ex-suggestion">💡 '+suggestion+'</div>';
      if (ex.timed) {
        html += '<div class="timer-block" id="tw-'+ex.id+'-'+dkey+'">';
        html += '<div class="timer-display" id="td-'+ex.id+'-'+dkey+'">'+ex.seconds+'</div>';
        html += '<button class="timer-btn" data-action="start" data-exid="'+ex.id+'" data-dkey="'+dkey+'" data-seconds="'+ex.seconds+'" onclick="handleTimerBtn(this)">Start</button>';
        html += '<button class="timer-btn reset-btn" data-exid="'+ex.id+'" data-dkey="'+dkey+'" data-seconds="'+ex.seconds+'" onclick="resetTimer(this.dataset.exid,this.dataset.dkey,parseInt(this.dataset.seconds))">Reset</button>';
        html += '<span style="color:var(--text3);font-size:11px;font-family:var(--mono)">'+ex.reps+'</span></div>';
      } else {
        // Weight input (only for weighted)
        var savedSets = LOG[dkey]&&LOG[dkey][ex.id] ? LOG[dkey][ex.id] : [];
        var savedWeight = savedSets.length>0 && savedSets[0] ? (savedSets[0].kg||'') : '';
        if (ex.weighted) {
          html += '<div class="weight-row">';
          html += '<span class="weight-label">Gewicht</span>';

          html += '<span class="weight-unit">kg</span>';
          html += '<span class="weight-note">· alle Sätze</span>';

        for (var s=0; s<ex.sets; s++) {

          html += '</div>';
        }

      }

    });

}

  NUTRITION.principles.forEach(function(p){ html+='<div class="info-box"><span style="color:var(--accent4)">'+p.k+' — </span>'+p.v+'</div>'; });

// ══ FORTSCHRITT ══

  var info=getCurrentWeekDay();
  var totalDone=0;
  for(var d=0;d<=info.totalDay;d++){ var dk=dateKey(getDateForDay(d)); if(LOG[dk]&&LOG[dk]._done) totalDone++; }
  var pct=Math.round(totalDone/Math.min(info.totalDay+1,84)*100);
  var html='<div class="card" style="border-left:3px solid var(--accent);margin-bottom:12px">';
  html+='<p class="card-label" style="color:var(--accent)">Gesamtfortschritt</p>';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  html+='<span style="color:var(--text);font-size:28px;font-family:var(--mono);font-weight:bold">'+pct+'%</span>';
  html+='<span style="color:var(--text3);font-size:12px;font-family:var(--mono)">'+totalDone+' / 84 Tage</span></div>';
  html+='<div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--accent);border-radius:3px"></div></div></div>';
  var phases=[
    {name:'Phase 1 — Fundament',weeks:'Wo 1–4',focus:'Gewohnheit aufbauen. Form festigen. Leichte Läufe verlangsamen.'},
    {name:'Phase 2 — Aufbau',weeks:'Wo 5–8',focus:'Gewicht erhöhen. Langen Lauf auf 12k ausdehnen. Tempo-Intervalle.'},
    {name:'Phase 3 — Akkumulieren',weeks:'Wo 9–12',focus:'Zeit auf den Beinen. Ultra-Ermüdung simulieren. 16k Lauf.'},
  ];
  var cp=Math.min(Math.floor((info.week-1)/4),2);
  phases.forEach(function(p,i){
    var a=i===cp;
    html+='<div class="card" style="margin-bottom:8px;border-left:3px solid '+(a?'var(--accent)':'var(--border)')+'"><div style="display:flex;justify-content:space-between;margin-bottom:4px">';
    html+='<p style="color:'+(a?'var(--accent)':'var(--text3)')+';font-size:10px;font-family:var(--mono);letter-spacing:.15em;text-transform:uppercase">'+p.name+'</p>';
    html+='<span style="color:var(--text3);font-size:10px;font-family:var(--mono)">'+p.weeks+'</span></div>';
    html+='<p style="color:var(--text2);font-size:12px;line-height:1.5">'+p.focus+'</p></div>';
  });
  html+='<p style="color:var(--text4);font-size:10px;font-family:var(--mono);letter-spacing:.2em;text-transform:uppercase;margin:14px 0 8px">Wochenübersicht</p>';
  for(var w=1;w<=12;w++){
    var wd=0; for(var d=0;d<7;d++){ var dk=dateKey(getDateForDay((w-1)*7+d)); if(LOG[dk]&&LOG[dk]._done) wd++; }
    var isc=w===info.week;
    html+='<div class="prog-week"><span style="color:'+(isc?'var(--accent)':'var(--text3)')+';font-size:11px;font-family:var(--mono);min-width:48px">Wo '+w+'</span>';
    html+='<div class="prog-bar-bg"><div class="prog-bar-fill" style="width:'+Math.round(wd/7*100)+'%;background:'+(isc?'var(--accent)':'var(--accent3)')+'"></div></div>';
    html+='<span style="color:var(--text4);font-size:11px;font-family:var(--mono);min-width:28px;text-align:right">'+wd+'/7</span></div>';
  }
  document.getElementById('fortschritt-content').innerHTML = html;
}

// ══ TIMERS ══
function handleTimerBtn(btn) {
  var exId = btn.dataset.exid, dkey = btn.dataset.dkey, seconds = parseInt(btn.dataset.seconds);
  var key = exId + '-' + dkey;
  if (TIMERS[key] && TIMERS[key].interval) {
    stopTimer(exId, dkey, seconds);
  } else {
    startTimer(exId, dkey, seconds);
  }
}
function startTimer(exId, dkey, seconds) {
  var key = exId + '-' + dkey;
  // Clear any existing interval for this key
  if (TIMERS[key] && TIMERS[key].interval) clearInterval(TIMERS[key].interval);
  // Use remaining time if timer was paused, else start fresh
  var rem = (TIMERS[key] && TIMERS[key].rem > 0 && TIMERS[key].rem < seconds) ? TIMERS[key].rem : seconds;
  TIMERS[key] = { interval: null, rem: rem };
  var disp = document.getElementById('td-' + exId + '-' + dkey);
  var wrap = document.getElementById('tw-' + exId + '-' + dkey);
  if (!disp || !wrap) return;
  disp.style.color = 'var(--accent2)';
  disp.textContent = rem;
  var btn = wrap.querySelector('.timer-btn:not(.reset-btn)');
  if (btn) { btn.textContent = 'Stop'; btn.className = 'timer-btn stop'; btn.setAttribute('data-action','stop'); }
  TIMERS[key].interval = setInterval(function() {
    if (!TIMERS[key]) return;
    TIMERS[key].rem--;
    var e = document.getElementById('td-' + exId + '-' + dkey);
    if (e) e.textContent = TIMERS[key].rem;
    if (TIMERS[key].rem <= 0) {
      clearInterval(TIMERS[key].interval);
      TIMERS[key] = null;
      var e2 = document.getElementById('td-' + exId + '-' + dkey);
      if (e2) { e2.textContent = '✓'; e2.style.color = 'var(--accent3)'; }
      var w2 = document.getElementById('tw-' + exId + '-' + dkey);
      if (w2) { var b2 = w2.querySelector('.timer-btn:not(.reset-btn)'); if (b2) { b2.textContent = 'Start'; b2.className = 'timer-btn'; } }
      beep(880, 3);
    }
  }, 1000);
}
function stopTimer(exId, dkey, seconds) {
  var key = exId + '-' + dkey;
  if (TIMERS[key] && TIMERS[key].interval) { clearInterval(TIMERS[key].interval); TIMERS[key].interval = null; }
  var wrap = document.getElementById('tw-' + exId + '-' + dkey);
  if (!wrap) return;
  var btn = wrap.querySelector('.timer-btn.stop');
  if (btn) { btn.textContent = 'Start'; btn.className = 'timer-btn'; btn.setAttribute('data-action','start'); }
}
function resetTimer(exId, dkey, seconds) {
  var key = exId + '-' + dkey;
  if (TIMERS[key] && TIMERS[key].interval) clearInterval(TIMERS[key].interval);
  TIMERS[key] = null;
  var e = document.getElementById('td-' + exId + '-' + dkey);
  if (e) { e.textContent = seconds; e.style.color = 'var(--accent2)'; }
  var wrap = document.getElementById('tw-' + exId + '-' + dkey);
  if (wrap) { var btn = wrap.querySelector('.timer-btn:not(.reset-btn)'); if (btn) { btn.textContent = 'Start'; btn.className = 'timer-btn'; } }
}

function startStretchTimer(idx,secs){
  if(STRETCH_TIMERS[idx]) clearInterval(STRETCH_TIMERS[idx]);
  var rem=secs;
  var el=document.getElementById('st-'+idx);
  if(el) el.style.color='var(--accent2)';
  STRETCH_TIMERS[idx]=setInterval(function(){
    rem--;
    var e=document.getElementById('st-'+idx); if(e) e.textContent=rem;
    if(rem<=0){
      clearInterval(STRETCH_TIMERS[idx]); delete STRETCH_TIMERS[idx];
      var e2=document.getElementById('st-'+idx); if(e2){e2.textContent='✓';e2.style.color='var(--accent3)';}
      beep(660,2);
    }
  },1000);
}
function resetStretchTimer(idx,secs){
  if(STRETCH_TIMERS[idx]){clearInterval(STRETCH_TIMERS[idx]);delete STRETCH_TIMERS[idx];}
  var e=document.getElementById('st-'+idx); if(e){e.textContent=secs;e.style.color='var(--accent2)';}
}

// ══ PAUSE TIMER (auto) ══
function checkAndStartPause(ssId, dkey, restSecs) {
  // Find all exercises in this superset
  var ss = null;
  var type = null;
  var week = Math.floor(getCurrentWeekDay().totalDay/7)+1;
  ['kraft-a','kraft-b','kraft-c'].forEach(function(t){
    SUPERSETS_BASE[t].concat([{id:'ss-core',ex:getCoreFinisher(t,week)}]).forEach(function(s){ if(s.id===ssId){ss=s;type=t;} });
  });
  if(!ss) return;
  // Check if all non-timed exercises have at least one rep entered in current set
  var allDone = ss.ex.every(function(ex){
    if(ex.timed) return true;
    var sets = LOG[dkey]&&LOG[dkey][ex.id] ? LOG[dkey][ex.id] : [];
    // Check if at least one set has reps today
    return sets.some(function(s){ return s&&s.reps; });
  });
  if(!allDone) return;
  var el=document.getElementById('pause-'+ssId+'-'+dkey);
  if(!el||el.classList.contains('active')) return;
  el.classList.add('active');
  var rem=restSecs, key='pause-'+ssId+'-'+dkey;
  if(PAUSE_TIMERS[key]) clearInterval(PAUSE_TIMERS[key]);
  PAUSE_TIMERS[key]=setInterval(function(){
    rem--;
    var disp=document.getElementById('pause-disp-'+ssId+'-'+dkey); if(disp) disp.textContent=rem;
    if(rem<=0){
      clearInterval(PAUSE_TIMERS[key]); delete PAUSE_TIMERS[key];
      var e=document.getElementById('pause-'+ssId+'-'+dkey);
      if(e) e.classList.remove('active');
      beep(528,2);
    }
  },1000);
}
function skipPause(ssId,dkey){
  var key='pause-'+ssId+'-'+dkey;
  if(PAUSE_TIMERS[key]){clearInterval(PAUSE_TIMERS[key]);delete PAUSE_TIMERS[key];}
  var el=document.getElementById('pause-'+ssId+'-'+dkey); if(el) el.classList.remove('active');
}

// ══ LOGGING ══
function saveWeight(exId, dkey, val) {
  if(!LOG[dkey]) LOG[dkey]={};
  if(!LOG[dkey][exId]) LOG[dkey][exId]=[];
  // Apply weight to all sets
  var sets=LOG[dkey][exId];
  for(var i=0;i<10;i++){
    if(!sets[i]) sets[i]={kg:'',reps:'',done:false};
    sets[i].kg=val;
  }
  save('log',LOG);
}

function saveReps(exId, dkey, setIdx, val, ssId) {
  if(!LOG[dkey]) LOG[dkey]={};
  if(!LOG[dkey][exId]) LOG[dkey][exId]=[];
  if(!LOG[dkey][exId][setIdx]) LOG[dkey][exId][setIdx]={kg:'',reps:'',done:false};
  LOG[dkey][exId][setIdx].reps=val;
  // Auto-mark done when reps entered
  LOG[dkey][exId][setIdx].done=!!(val&&val.length>0);
  save('log',LOG);
  // Update set button visual
  var el=document.getElementById('sb-'+exId+'-'+dkey+'-'+setIdx);
  if(el) el.classList.toggle('done',!!(val&&val.length>0));
  // Check if we should start pause timer
  if(ssId) {
    // Find rest seconds for this superset
    var restSecs=90;
    ['kraft-a','kraft-b','kraft-c'].forEach(function(t){
      SUPERSETS_BASE[t].forEach(function(s){ if(s.id===ssId) restSecs=s.rest; });
    });
    setTimeout(function(){ checkAndStartPause(ssId,dkey,restSecs); },300);
  }
}

function toggleMob(dkey,itemId){
  if(!LOG[dkey]) LOG[dkey]={};
  if(!LOG[dkey]._mob) LOG[dkey]._mob={};
  LOG[dkey]._mob[itemId]=!LOG[dkey]._mob[itemId];
  save('log',LOG);
  var info=getCurrentWeekDay(); renderHeute(info.totalDay);
}

function getLastWeight(exId) {
  var keys=Object.keys(LOG).sort().reverse();
  for(var i=0;i<keys.length;i++){
    var e=LOG[keys[i]];
    if(e&&e[exId]&&e[exId].length>0){
      for(var s=0;s<e[exId].length;s++){ if(e[exId][s]&&e[exId][s].kg) return parseFloat(e[exId][s].kg); }
    }
  }
  return null;
}
function lastSetsAllDone(exId, currentDkey) {
  var keys=Object.keys(LOG).sort().reverse();
  for(var i=0;i<keys.length;i++){
    if(keys[i]===currentDkey) continue;
    var e=LOG[keys[i]];
    if(e&&e[exId]&&e[exId].length>0) return e[exId].every(function(s){return s&&s.done;});
  }
  return false;
}

// ══ NAV ══
function showTab(id){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  var t=document.getElementById('tab-'+id); if(t) t.classList.add('active');
  var m={heute:0,plan:1,stretching:2,ernaehrung:3,herzfreq:4,fortschritt:5};
  var btns=document.querySelectorAll('.nav-btn'); if(m[id]!==undefined&&btns[m[id]]) btns[m[id]].classList.add('active');
}
